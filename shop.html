<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SlimeClicker | Shop</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="img.png">
  <link href="https://fonts.googleapis.com/css2?family=Schoolbell&display=swap" rel="stylesheet">
</head>
<body>
  <div class="Menu">  
    <a href="index.html" class="menubutton"><strong>Main</strong></a>
    <a href="shop.html" class="menubutton"><strong>Shop</strong></a>
  </div>

  <div class="coins-display">
    Plorts: <span id="count">0</span>
  </div>

  <div class="ShopMain">
    <p><strong>Shop</strong></p>

    <div class="shop-item">
      <img src="img.png" alt="Upgrade Click" class="shop-image">
      <button class="shop-button" id="upgradebutton">Plort Upgrade</button>
    </div>

    <div class="shop-item">
      <img src="dervishslime.png" alt="Dervish Slime" class="shop-image">
      <button class="shop-button" id="autoclick">Dervish Slime</button>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <p id="modal-text"></p>
      <div class="modal-buttons">
        <button class="modal-button" id="modal-yes">OK</button>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
