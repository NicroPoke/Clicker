<!DOCTYPE html>
<head>
  <meta charset="UTF-8">
  <title>SlimeClicker|Shop</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="img.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Schoolbell&display=swap" rel="stylesheet">
</head>
<body>
  <div class="Menu">  
    <a href="index.html" class="menubutton"><strong>Main</strong></a>
    <a href="shop.html" class="menubutton"><strong>Shop</strong></a>
  </div>
  <div class="coins-display">
    Coins: <span id="count">0</span>
  </div>
  <div class="ShopMain">
    <p><strong>Shop</strong></p>
    <button class="shop-button" id="upgradebutton">Upgrade click +1</button>
    <br>
    <button class="shop-button" id="autoclick">Dervish Slime</button>
    <img src="dervishslime.png" alt="Dervish Slime" class="shop-image" id="shop-image">
  </div>
  <script src="main.js"></script>
</body>
</html>
